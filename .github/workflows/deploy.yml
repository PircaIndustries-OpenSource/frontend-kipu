name: Despliegue Automático a Firebase

on:
  push:
    branches: 
      - deploy

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./kipu-frontend 

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Construir el proyecto (Angular)
        run: npm run build

      - name: Desplegar a Firebase
        run: npx firebase-tools deploy --only hosting --token ${{ secrets.FIREBASE_TOKEN }} --non-interactive --project kipu-frontend-42d0d

# Forzando actualizacion de Git