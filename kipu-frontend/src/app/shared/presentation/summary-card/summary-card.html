<mat-card class="bg-neutral-bg! w-52! border! border-primary! h-4xl gap-xs p-m"
          [class.bg-neutral-bg!]="!active()"
          [class.bg-neutral-border!]="active()"
>
  <mat-card-header class="flex justify-center">
    <mat-card-title class="font-bold! text-2xl!">{{value()}}</mat-card-title>
  </mat-card-header>
  <mat-card-content class="flex text-center">
    {{title()}}
  </mat-card-content>
</mat-card>
