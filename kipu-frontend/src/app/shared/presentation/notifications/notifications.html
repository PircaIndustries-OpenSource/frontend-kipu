<style>
  .notifications-wrapper {
    width: 100% !important;
    box-sizing: border-box !important;
    padding: 2rem 1rem !important;
    display: block !important;
  }
  .notifications-card {
    width: 100% !important;
    max-width: 896px !important;
    margin: 0 auto !important;
    background: rgba(255, 255, 255, 0.8) !important;
    backdrop-filter: blur(12px) !important;
    border: 1px solid rgba(226, 232, 240, 0.5) !important;
    border-radius: 1rem !important;
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04) !important;
    padding: 2rem !important;
    box-sizing: border-box !important;
    display: block !important;
    position: relative !important;
    overflow: hidden !important;
  }
</style>

<div class="notifications-wrapper bg-neutral-bg min-h-[85vh]">
  <div class="notifications-card">
    
    <!-- Top Header -->
    <div class="flex items-center justify-between mb-6 pb-6 border-b border-slate-100">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center text-white text-xl">
          🔔
        </div>
        <div>
          <h2 class="text-2xl font-bold text-slate-800">{{ 'notifications.title' | translate }}</h2>
          <p class="text-slate-500 text-xs mt-0.5">{{ 'notifications.subtitle' | translate }}</p>
        </div>
      </div>
      
      <div class="flex items-center gap-3">
        <button 
          *ngIf="notificationService.unreadCount() > 0"
          (click)="markAllAsRead()"
          class="px-4 py-2 text-xs font-semibold text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-lg transition-all active:scale-95 cursor-pointer">
          {{ 'notifications.mark_all_read' | translate }}
        </button>
        <button 
          (click)="goBack()" 
          class="flex items-center gap-2 px-4 py-2 bg-slate-800 hover:bg-slate-900 text-white font-medium text-sm rounded-lg transition-all active:scale-95 cursor-pointer">
          <i class="pi pi-arrow-left text-xs"></i>
          {{ 'notifications.back' | translate }}
        </button>
      </div>
    </div>

    <!-- Tabs Filtering -->
    <div class="flex border-b border-slate-100 mb-6">
      <button 
        (click)="currentTab = 'all'" 
        [class]="'px-6 py-3 font-semibold text-sm border-b-2 transition-all cursor-pointer ' + (currentTab === 'all' ? 'border-slate-800 text-slate-800' : 'border-transparent text-slate-400 hover:text-slate-600')">
        {{ 'notifications.tab_all' | translate }} ({{ notificationService.projectNotifications().length }})
      </button>
      <button 
        (click)="currentTab = 'unread'" 
        [class]="'px-6 py-3 font-semibold text-sm border-b-2 transition-all cursor-pointer ' + (currentTab === 'unread' ? 'border-slate-800 text-slate-800' : 'border-transparent text-slate-400 hover:text-slate-600')">
        {{ 'notifications.tab_unread' | translate }} ({{ notificationService.unreadCount() }})
      </button>
    </div>

    <!-- Notifications List -->
    <div class="flex flex-col gap-4 max-h-[50vh] overflow-y-auto pr-2">
      <div 
        *ngFor="let item of filteredNotifications" 
        (click)="selectNotification(item)"
        [class]="'flex gap-4 p-4 border rounded-xl cursor-pointer transition-all duration-200 hover:shadow-md hover:-translate-y-0.5 ' + (item.read ? 'bg-white border-slate-100 opacity-75' : 'bg-slate-50 border-slate-200')">
        
        <!-- Type Icon -->
        <div class="flex-none">
          <div [class]="'w-10 h-10 rounded-xl flex items-center justify-center ' + getIconForType(item.type)">
            <i [class]="getIconForType(item.type).split(' ')[0]"></i>
          </div>
        </div>

        <!-- Content Details -->
        <div class="flex-1 min-w-0">
          <div class="flex items-center justify-between gap-2">
            <h4 [class]="'truncate font-bold ' + (item.read ? 'text-slate-700' : 'text-slate-900')">{{ item.title }}</h4>
            <span class="text-[10px] text-slate-400 whitespace-nowrap">{{ item.date | date:'short' }}</span>
          </div>
          <p class="text-slate-500 text-xs mt-1 leading-relaxed">{{ item.description }}</p>
        </div>

        <!-- Action Controls -->
        <div class="flex-none flex items-center gap-2">
          <button 
            *ngIf="!item.read" 
            (click)="markAsRead($event, item.id)"
            pButton 
            icon="pi pi-check" 
            class="p-button-rounded p-button-text p-button-sm text-slate-500 hover:text-slate-800 cursor-pointer"
            [title]="'notifications.mark_read' | translate">
          </button>
          <button 
            (click)="dismiss($event, item.id)"
            pButton 
            icon="pi pi-times" 
            class="p-button-rounded p-button-text p-button-danger p-button-sm text-red-500 hover:text-red-700 cursor-pointer"
            [title]="'notifications.dismiss' | translate">
          </button>
        </div>

      </div>

      <!-- Empty State -->
      <div 
        *ngIf="filteredNotifications.length === 0" 
        class="text-center py-12 border border-slate-200 border-dashed rounded-xl bg-slate-50/50">
        <i class="pi pi-bell-slash text-slate-300 text-3xl mb-3"></i>
        <h4 class="font-semibold text-slate-600">{{ 'notifications.empty_title' | translate }}</h4>
        <p class="text-slate-400 text-xs mt-1">{{ 'notifications.empty_desc' | translate }}</p>
      </div>

    </div>

  </div>
</div>
