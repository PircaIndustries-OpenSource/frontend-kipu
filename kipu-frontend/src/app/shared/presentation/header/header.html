<div class="flex items-center justify-between px-xl h-16 bg-white border-b border-neutral-border/40">
  <div class="flex items-center gap-3">
    <h1 class="text-2xl font-bold text-primary">{{currentProject()}}</h1>
    <button
      routerLink="/projects"
      class="text-neutral-border hover:text-primary cursor-pointer transition-all duration-200 hover:scale-110 active:scale-90">
      <mat-icon class="text-[20px]! w-5! h-5!">edit</mat-icon>
    </button>
  </div>
  <div class="flex items-center gap-6">
    <button
      routerLink="/notifications"
      class="text-primary flex items-center justify-center cursor-pointer transition-all duration-200 hover:scale-110 active:scale-90 overflow-visible"
      matBadge=" "
      matBadgeSize="small"
      matBadgeColor="warn"
      matBadgePosition="above after"
      [matBadgeHidden]="!unreadRequest()">
      <mat-icon class="text-[32px]! w-8! h-8!">notifications</mat-icon>
    </button>
    <button
      routerLink="/settings"
      class="text-primary flex items-center justify-center cursor-pointer transition-all duration-200 hover:scale-110 active:scale-90">
      <mat-icon class="text-[32px]! w-8! h-8!">settings</mat-icon>
    </button>
  </div>
</div>
