<h2 mat-dialog-title>{{ data.title | translate }}</h2>

<mat-dialog-content class="flex flex-col gap-4 pt-4">

  @if (data.action === 'solve') {
    <div class="flex flex-col">
      <label class="text-xs font-bold text-neutral-500 uppercase">{{ 'rnc.dialog.severity_status' | translate }}</label>
      <select [(ngModel)]="selectionValue" class="w-full border border-neutral-300 p-2 rounded-md">
        <option value="Low">{{ 'rnc.severity.low' | translate }}</option>
        <option value="Moderate">{{ 'rnc.severity.moderate' | translate }}</option>
        <option value="Critical">{{ 'rnc.severity.critical' | translate }}</option>
        <option value="Solved">{{ 'rnc.status.solved' | translate }}</option>
      </select>
    </div>
  } @else if (data.action === 'changeStatus') {
    <div class="flex flex-col">
      <label class="text-xs font-bold text-neutral-500 uppercase">Status</label>
      <select [(ngModel)]="statusOption" class="w-full border border-neutral-300 p-2 rounded-md">
        <option value="Solved">Solved</option>
        <option value="Unsolved">Unsolved</option>
      </select>
    </div>

    @if (statusOption === 'Unsolved') {
      <div class="flex flex-col">
        <label class="text-xs font-bold text-neutral-500 uppercase">Severity</label>
        <select [(ngModel)]="severityOption" class="w-full border border-neutral-300 p-2 rounded-md">
          <option value="Low">Low</option>
          <option value="Moderate">Moderate</option>
          <option value="Critical">Critical</option>
        </select>
      </div>
    }
  }

  <div class="flex flex-col">
    <label class="text-xs font-bold text-neutral-500 uppercase">{{ 'rnc.dialog.solution_notes' | translate }}</label>
    <textarea [(ngModel)]="inputValue" class="w-full border border-neutral-300 p-2 rounded-md" rows="3"></textarea>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end" class="pt-4">
  <button mat-dialog-close class="px-6 py-2 text-neutral-600 font-bold hover:bg-neutral-100 rounded-md">{{ 'rnc.dialog.cancel' | translate }}</button>
  <button (click)="confirm()" class="px-6 py-2 bg-[#2c3e50] text-white rounded-md font-bold hover:brightness-110">{{ 'rnc.dialog.confirm' | translate }}</button>
</mat-dialog-actions>
