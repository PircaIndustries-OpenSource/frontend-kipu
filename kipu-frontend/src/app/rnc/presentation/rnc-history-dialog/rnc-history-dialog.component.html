<h2 mat-dialog-title>{{ 'rnc.dialog.history_title' | translate }}</h2>
<mat-dialog-content class="pt-4">
  <div class="flex flex-col gap-4">
    @for (log of data.logs; track log.date) {
      <div class="p-3 bg-neutral-50 rounded border border-neutral-200">

        <p class="text-[9px] text-neutral-400 uppercase font-bold">{{ log.date | date:'dd/MM/yyyy HH:mm' }}</p>

        <p class="text-xs font-semibold text-primary mt-1">{{ log.note === 'No details provided' ? ('rnc.summary.no_details' | translate) : log.note }}</p>
      </div>
    } @empty {
      <p class="text-sm text-neutral-400 italic text-center py-4">No logs yet.</p>
    }
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-dialog-close>{{ 'general.cancel' | translate }}</button>
</mat-dialog-actions>
