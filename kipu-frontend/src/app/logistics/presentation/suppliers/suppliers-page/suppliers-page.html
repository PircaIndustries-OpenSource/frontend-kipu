<section class="flex flex-col gap-xl p-xl animate-fade-in">
  <header class="flex flex-row justify-between items-center">
    <h1 class="text-3xl font-bold text-primary tracking-tight">
      {{ 'suppliers.title' | translate }}
    </h1>
    <button matRipple class="w-60 bg-accent text-white! py-5! rounded-m! font-bold! text-base! shadow-md! cursor-pointer transition-all hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-2">
      <mat-icon>add_circle</mat-icon>
      {{ 'suppliers.button-create' | translate }}
    </button>
  </header>
  <div class="flex flex-row gap-xl">
    <div class="flex-1 min-w-0 flex flex-col gap-l">
      <app-supplier-list [suppliers]="suppliers()"></app-supplier-list>
    </div>
    <aside class="w-64 flex flex-col gap-xl">
      <div class="flex flex-col gap-m">
        <h3 class="text-xs font-black text-primary uppercase tracking-widest
                   border-b border-primary/10 pb-2">
          {{ 'general.summary' | translate }}
        </h3>
        <div class="flex flex-col items-center">
          <app-summary-card [title]="'suppliers.summary.active' | translate" [value]="suppliersActive">
          </app-summary-card>
        </div>

      </div>
    </aside>
  </div>

</section>
