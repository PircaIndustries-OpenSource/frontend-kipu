<section class="flex flex-col gap-xl p-xl animate-fade-in">
  <header class="flex flex-row justify-between items-center">
    <h1 class="text-3xl font-bold text-primary tracking-tight">
      {{ 'suppliers.title' | translate }}
    </h1>
    <button (click)="openCreateDialog()" matRipple class="w-60 bg-accent text-white! py-5! rounded-m! font-bold! text-base! shadow-md! cursor-pointer transition-all hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-2">
      <mat-icon>add_circle</mat-icon>
      {{ 'suppliers.button-create' | translate }}
    </button>
  </header>
  <mat-form-field appearance="outline" class="w-full max-w-md">
    <mat-label>{{ 'suppliers.search-ruc' | translate }}</mat-label>
    <input matInput [value]="searchRuc()" (input)="onSearchRucChange($any($event.target).value)" [placeholder]="'suppliers.search-ruc-placeholder' | translate">
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>
  <div class="flex flex-row gap-xl">
    <div class="flex-1 min-w-0 flex flex-col gap-l">
      <app-supplier-list [suppliers]="suppliers()"></app-supplier-list>
    </div>
    <aside class="w-64 flex flex-col gap-xl">
      <div class="flex flex-col gap-m">
        <h3 class="text-xs font-black text-primary uppercase tracking-widest
                   border-b border-primary/10 pb-2">
          {{ 'general.summary' | translate }}
        </h3>
        <div class="flex flex-col items-center">
          <button (click)="toggleActiveSupplierFilter()">
            <app-summary-card [title]="'suppliers.summary.active' | translate" [value]="suppliersActive()" [active]="activeSupplierFilter()">
            </app-summary-card>
          </button>

        </div>
        <div class="flex flex-col items-center">
          <button (click)="toggleInactiveSupplierFilter()">
            <app-summary-card [title]="'suppliers.summary.inactive' | translate" [value]="supplierInactive()"  [active]="inactiveSupplierFilter()">
            </app-summary-card>
          </button>

        </div>
      </div>
    </aside>
  </div>
</section>
