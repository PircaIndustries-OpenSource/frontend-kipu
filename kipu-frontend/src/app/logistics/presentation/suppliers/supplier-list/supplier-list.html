<div class="flex flex-col gap-l flex-1 w-full">
  @for(supplier of suppliers(); track supplier.ruc){
    <app-supplier-item [supplier]="supplier"></app-supplier-item>
  } @empty {
    <div class="flex flex-col items-center justify-center py-16 text-center border-2 border-dashed border-neutral-border/30 rounded-xl">
      <mat-icon class="text-5xl text-neutral-border/40 mb-4">business</mat-icon>
      <p class="text-neutral-border font-medium text-lg">{{ 'suppliers.empty' | translate }}</p>
    </div>
  }
</div>
