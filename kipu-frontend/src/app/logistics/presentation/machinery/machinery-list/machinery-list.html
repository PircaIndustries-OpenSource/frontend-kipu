<div class="flex flex-col gap-l flex-1 w-full">
  @for(item of items(); track item.id){
    <app-machinery-item [item]="item"></app-machinery-item>
  } @empty {
    <div class="flex flex-col items-center justify-center py-16 text-center border-2 border-dashed border-neutral-border/30 rounded-xl">
      <mat-icon class="text-5xl text-neutral-border/40 mb-4">build</mat-icon>
      <p class="text-neutral-border font-medium text-lg">{{ 'machinery.empty' | translate }}</p>
    </div>
  }
</div>
