<section class="flex flex-col gap-xl">
  <header class="flex flex-row justify-between">
    <h1 class="text-2xl font-bold">{{'inventory.title' | translate }}</h1>
    <app-autocomplete-filter-list
      [label]="'inventory.filters.category'|translate"
      [placeholder]="'inventory.filters.placeholder'|translate"
      [listOptions]="categories()"
      (optionSelected)="onCategorySelect($event)"
    />
  </header>
  <div class="flex flex-row gap-2xl">
    <div class="flex flex-col gap">
      <app-material-list [materials]="materials()"></app-material-list>
    </div>
    <div class="flex flex-col gap-l">
      <app-summary-card  [title]="'inventory.summary.registered-materials' | translate"
                         [value]="materialsCount()"></app-summary-card>
      <app-summary-card  [title]="'inventory.summary.critical-stock-alert' | translate"
                         [value]="criticalMaterialsCount()"></app-summary-card>
    </div>
  </div>
</section>
