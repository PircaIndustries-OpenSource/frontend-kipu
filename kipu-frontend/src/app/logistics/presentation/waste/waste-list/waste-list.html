<div class="flex flex-col gap-l flex-1 w-full">
  @for(waste of wasteList(); track waste.id){
    <app-waste-item [waste]="waste"></app-waste-item>
  } @empty {
    <div class="flex flex-col items-center justify-center py-16 text-center border-2 border-dashed border-neutral-border/30 rounded-xl">
      <mat-icon class="text-5xl text-neutral-border/40 mb-4">delete_outline</mat-icon>
      <p class="text-neutral-border font-medium text-lg">{{ 'waste.empty' | translate }}</p>
    </div>
  }
</div>
