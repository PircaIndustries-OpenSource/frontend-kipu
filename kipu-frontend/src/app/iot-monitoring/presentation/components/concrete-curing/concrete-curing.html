<div class="sensor-grid">
  @for (sensor of concreteSensors(); track sensor.id) {
    <mat-card class="curing-card" [ngClass]="getSensorStatusClass(sensor.temperature, sensor.limit)">

      <mat-card-header class="card-header">
        <div class="badges">
          <span class="badge sensor-name">{{ sensor.name }}</span>
          <span class="badge sensor-state">{{ sensor.state }}</span>
        </div>
        <span class="sensor-location">{{ sensor.location }}</span>
      </mat-card-header>

      <mat-card-content class="card-content">
        <div class="metric">
          <span class="value" [ngClass]="getSensorStatusClass(sensor.temperature, sensor.limit)">
            {{ sensor.temperature }}{{ sensor.unit }}
          </span>
          <span class="label">TEMPERATURE</span>
        </div>

        <div class="vertical-divider"></div>

        <div class="metric">
          <span class="value">
            {{ sensor.humidity }}%
          </span>
          <span class="label">HUMIDITY</span>
        </div>
      </mat-card-content>

      <hr class="horizontal-divider">

      <mat-card-footer class="card-footer">
        <div class="alert-info">
          <span class="alert-label">WARNING BREAKPOINT</span>
          <span class="alert-value">{{ sensor.limit }}{{ sensor.unit }}</span>
        </div>
        <button mat-flat-button class="config-btn">
          CONFIGURE
        </button>
      </mat-card-footer>

    </mat-card>
  }
</div>
