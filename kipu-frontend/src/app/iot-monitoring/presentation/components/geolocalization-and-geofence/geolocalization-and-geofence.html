<div class="geo-header">
  <h2>Geolocalization y Geofence</h2>
  <button mat-flat-button color="primary" class="edit-btn">Editar Límite Obra</button>
</div>

<div class="geo-dashboard">

  <div class="map-section">
    <div class="grid-container">

      <svg class="geofence-svg" width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none">
        <polygon points="20,30 65,30 65,85 20,70" class="geofence-polygon" />
      </svg>

      @for (equip of geolocalizationPoints(); track equip.numberId) {
        <div class="map-marker" [style.left.%]="equip.longitude" [style.top.%]="equip.latitude">
          <div class="marker-tooltip" [ngClass]="equip.state">
            @if (equip.state === 'OUTSIDE OF LIMIT') { <mat-icon class="alert-icon">warning</mat-icon> }
            {{ equip.name }}
          </div>
          <div class="marker-dot" [ngClass]="equip.state"></div>
        </div>
      }

      <mat-card class="map-legend">
        <span class="legend-title">Legend</span>
        <div class="legend-item">
          <div class="dashed-line"></div>
          <span>Work Limit</span>
        </div>
      </mat-card>

    </div>
  </div>

  <aside class="equipment-panel">
    <mat-card class="equipment-card">
      <h3 class="panel-title">Tracked Teams</h3>

      <div class="equipment-list">
        @for (equip of geolocalizationPoints(); track equip.id) {
          <div class="eq-item" [ngClass]="equip.state">
            <div class="eq-info">
              <span class="eq-name">{{ equip.name }}</span>
              <span class="eq-status-text" [ngClass]="equip.state">
                State: {{ equip.state }}
              </span>
            </div>
            <div class="status-dot" [ngClass]="equip.state"></div>
          </div>
        }
      </div>
    </mat-card>
  </aside>

</div>
