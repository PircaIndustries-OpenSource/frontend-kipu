<h2 mat-dialog-title>Add New Concrete Curing Sensor</h2>


<mat-dialog-content class="sensor-form">
  <p class="form-instruction">Enter the details for the new monitoring point.</p>

  <mat-form-field appearance="outline">
    <mat-label>Sensor Name</mat-label>
    <input matInput [(ngModel)]="sensorForm.sensorId" placeholder="Ex: S-TMP-03">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Sensor Location</mat-label>
    <input matInput [(ngModel)]="sensorForm.location" placeholder="Ex: North Sector Alpha">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Sensor Limit</mat-label>
    <input matInput [(ngModel)]="sensorForm.limit" placeholder="Ex: 9">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Temperature</mat-label>
    <input matInput type="number" [(ngModel)]="sensorForm.temperature" placeholder="Ex: 9">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Humidity</mat-label>
    <input matInput type="number" [(ngModel)]="sensorForm.humidity" placeholder="Ex: 9">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Unit</mat-label>
    <input matInput [(ngModel)]="sensorForm.unit" placeholder="Ex: C">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Initial Status</mat-label>
    <mat-select [(ngModel)]="sensorForm.state">
      <mat-option value="normal">ONLINE</mat-option>
      <mat-option value="peligro">OFFLINE</mat-option>
    </mat-select>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end" class="form-actions">
  <button mat-button mat-dialog-close>CANCEL</button>
  <button mat-flat-button color="primary" class="save-btn" [mat-dialog-close]="sensorForm">
    ADD SENSOR
  </button>
</mat-dialog-actions>
