<div class="min-h-screen bg-slate-800 flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-10">
    <h2 class="text-3xl font-bold text-gray-800 mb-2">Reiniciar contraseña</h2>
    <p class="text-gray-500 mb-8 text-sm">Ingresa una nueva contraseña</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
      <mat-form-field appearance="outline">
        <mat-label>Correo electrónico</mat-label>
        <input matInput formControlName="email" type="email" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Nueva contraseña</mat-label>
        <input matInput formControlName="password" type="password" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Confirmar nueva contraseña</mat-label>
        <input matInput formControlName="confirmPassword" type="password" />
      </mat-form-field>

      <button mat-flat-button color="primary" type="submit" class="!py-6" [disabled]="form.invalid || submitting">
        Continuar
      </button>
    </form>
  </div>
</div>
