<div class="min-h-screen bg-slate-800 flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-2xl flex flex-col md:flex-row w-full max-w-5xl overflow-hidden">
    <app-auth-banner></app-auth-banner>
    
    <section class="md:w-1/2 p-12 bg-gray-50 flex flex-col justify-center items-center">
      <div class="w-full max-w-sm">
        <h2 class="text-3xl font-bold text-gray-800 mb-2">Reiniciar contraseña</h2>
        <p class="text-gray-500 mb-8 text-sm">Ingresa tu correo para recuperar el acceso.</p>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
          <mat-form-field appearance="outline">
            <mat-label>Correo electrónico</mat-label>
            <input matInput formControlName="email" type="email" />
          </mat-form-field>

          <button mat-flat-button color="primary" type="submit" class="!py-6" [disabled]="form.invalid || submitting">
            Continuar
          </button>

          <p class="text-center text-xs text-gray-500 mt-2">
            <a routerLink="/login" class="text-blue-500 hover:underline">Volver al inicio de sesión</a>
          </p>
        </form>
      </div>
    </section>
  </div>
</div>
