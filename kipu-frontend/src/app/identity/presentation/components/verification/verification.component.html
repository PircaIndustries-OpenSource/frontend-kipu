<div class="min-h-screen bg-slate-800 flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-md">
    <section class="p-12 bg-gray-50 flex flex-col justify-center items-center">
      <h2 class="text-3xl font-bold text-gray-800 mb-2">Verificación de acceso</h2>
      <p class="text-gray-500 mb-8 text-sm">Ingresa el código enviado a tu canal de recuperación.</p>

      <div class="bg-white border border-gray-200 rounded-xl p-8 shadow-sm w-full max-w-md text-center">
        <h3 class="text-lg font-semibold text-gray-700 mb-2">Código de verificación</h3>
        <p class="text-sm text-gray-500 mb-6">
          Ingrese el código enviado a<br>
          <span class="font-bold text-gray-800">+51 987 654 321</span>
        </p>

        <form [formGroup]="verificationForm" (ngSubmit)="onVerify()" class="flex flex-col items-center">
          <div class="flex justify-center gap-2 mb-6 w-full">
            <input formControlName="digit1" type="text" maxlength="1" class="w-12 h-14 text-center text-2xl border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            <input formControlName="digit2" type="text" maxlength="1" class="w-12 h-14 text-center text-2xl border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            <input formControlName="digit3" type="text" maxlength="1" class="w-12 h-14 text-center text-2xl border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            <input formControlName="digit4" type="text" maxlength="1" class="w-12 h-14 text-center text-2xl border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            <input formControlName="digit5" type="text" maxlength="1" class="w-12 h-14 text-center text-2xl border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            <input formControlName="digit6" type="text" maxlength="1" class="w-12 h-14 text-center text-2xl border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>

          <button mat-flat-button color="primary" type="submit" class="w-full !py-6 text-lg mb-4" [disabled]="verificationForm.invalid">
            Continuar
          </button>

          <button type="button" (click)="resendCode()" class="text-sm text-gray-500 hover:text-blue-500 underline">
            Reenviar código
          </button>
        </form>
      </div>
    </section>
  </div>
</div>
