<div class="min-h-screen bg-slate-800 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-2xl flex flex-col md:flex-row w-full max-w-5xl overflow-hidden">
        <app-auth-banner></app-auth-banner>

        <section class="md:w-1/2 p-12 bg-gray-50 flex flex-col justify-center items-center">
            <h2 class="text-3xl font-bold text-gray-800 mb-2">Bienvenido de vuelta</h2>
            <p class="text-gray-500 mb-8 text-sm text-center">Ingresa tus credenciales para continuar</p>

            <mat-card class="bg-white rounded-xl shadow p-8 w-full flex flex-col items-center">
                <h3 class="font-medium text-gray-700 mb-2">Código de Verificación</h3>
                <p class="text-sm text-gray-500 mb-6 text-center">Ingrese el código enviado a<br><span
                        class="font-bold">+51 987 654 321</span></p>

                <div class="flex gap-2 mb-6">
                    <input type="text"
                        class="w-10 h-12 text-center border border-gray-300 rounded text-lg focus:outline-none focus:border-blue-500"
                        value="0">
                    <input type="text"
                        class="w-10 h-12 text-center border border-gray-300 rounded text-lg focus:outline-none focus:border-blue-500"
                        value="0">
                    <input type="text"
                        class="w-10 h-12 text-center border border-gray-300 rounded text-lg focus:outline-none focus:border-blue-500"
                        value="0">
                    <input type="text"
                        class="w-10 h-12 text-center border border-gray-300 rounded text-lg focus:outline-none focus:border-blue-500"
                        value="0">
                    <input type="text"
                        class="w-10 h-12 text-center border border-gray-300 rounded text-lg focus:outline-none focus:border-blue-500"
                        value="0">
                    <input type="text"
                        class="w-10 h-12 text-center border border-gray-300 rounded text-lg focus:outline-none focus:border-blue-500"
                        value="0">
                </div>

                <a mat-flat-button color="primary" routerLink="/dashboard" class="w-full !py-6 !mb-4">Iniciar sesión</a>
                @if (isResendDisabled()) {
                  <span class="text-sm text-gray-400 cursor-not-allowed">
                          Reenviar código en {{ countdown() }}s
                      </span>
                } @else {
                  <a href="" (click)="onResendCode($event)" class="text-sm text-gray-500 hover:text-blue-500 hover:underline transition-colors">
                    Reenviar código
                  </a>
                }
            </mat-card>
        </section>
    </div>
</div>
